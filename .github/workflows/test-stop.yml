env:
  KUBECONFIG: /tmp/github-ci.kubeconfig
jobs:
  stop:
    environment: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/actions/setup
      with:
        KUBECONFIG_DATA: "${{ secrets.KUBECONFIG_TEST }}"
    - env: {}
      name: Helm Chart stop
      run: |
        cp "${KUBECONFIG}" ".github-ci.kubeconfig"
        docker run -v "${PWD}:/data" -w /data ghcr.io/appuio/helm-v4:latest /bin/bash -c "cp .github-ci.kubeconfig /tmp/github-ci.kubeconfig; chmod 400 /tmp/github-ci.kubeconfig; /bin/helm uninstall '${CI_PR_HEAD_REF_SLUG}' --namespace '${NAMESPACE}' --kubeconfig /tmp/github-ci.kubeconfig"
    - env: {}
      name: k8ify stop
      run: |
        kubectl delete deployments,statefulsets,secrets,persistentvolumeclaims,ingresses,services,cronjobs,poddisruptionbudgets -l "k8ify.ref-slug=${CI_COMMIT_REF_SLUG}"
        kubectl delete claim -l "k8ify.ref-slug=${CI_COMMIT_REF_SLUG}" || true
name: Stop test
"on":
  delete: {}
  workflow_dispatch: {}
