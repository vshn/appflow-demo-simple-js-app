env:
  KUBECONFIG: /tmp/github-ci.kubeconfig
  REGISTRY: registry.cloudscale-lpg-2.appuio.cloud
  TEST_DOMAIN: apps.cloudscale-lpg-2.appuio.cloud
jobs:
  build:
    environment: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/actions/setup
      with:
        KUBECONFIG_DATA: "${{ secrets.KUBECONFIG_TEST }}"
    - id: build
      uses: ./.github/actions/build
      with:
        IMGNAME: "${{ env.CI_PROJECT_NAME }}"
        REGISTRY: "${{ env.REGISTRY }}"
    - env:
        IMAGE_DIGEST: "${{ steps.build.outputs.IMAGE_DIGEST || 'not built in this job' }}"
        NEWLINE: |2+

      name: k8ify preview
      run: |
        jq -r 'try to_entries | map("\(.key)=\(.value|tostring|tojson)") | .[]' > .composeenv <<'EOF' ${{ env.NEWLINE }}${{ toJson(vars) }}${{ env.NEWLINE }}EOF
        jq -r 'try to_entries | map("\(.key)=\(.value|tostring|tojson)") | .[]' >> .composeenv <<'EOF' ${{ env.NEWLINE }}${{ toJson(secrets) }}${{ env.NEWLINE }}EOF
        docker run -v "${PWD}:/data" -w "/data" --env-file <(env) ghcr.io/vshn/k8ify:latest /bin/k8ify test ${CI_COMMIT_REF_SLUG} --shell-env-file /data/.composeenv --modified-image '${{ env.NAMESPACE }}/${{ env.CI_PROJECT_NAME }}:${{ env.CI_COMMIT_REF_SLUG }}'
        rm .composeenv
        kubectl diff -f "${PWD}/manifests/" || true
    - env:
        IMAGE_DIGEST: "${{ steps.build.outputs.IMAGE_DIGEST || 'not built in this job' }}"
        NEWLINE: |2+

      name: Helm Chart preview
      run: |
        jq -n '.env=(env | with_entries(select(.key | startswith("KUBECONFIG_") | not)))' > ${PWD}/helm/env.yaml
        jq 'select(.!=null)|{vars:.,env:.}' > "${PWD}/helm/vars.yaml" <<'EOF' ${{ env.NEWLINE }}${{ toJson(vars) }}${{ env.NEWLINE }}EOF
        jq 'select(.!=null)|{secrets:.,env:.}' > "${PWD}/helm/secrets.yaml" <<'EOF' ${{ env.NEWLINE }}${{ toJson(secrets) }}${{ env.NEWLINE }}EOF
        jq '.env | keys' ${PWD}/helm/env.yaml
        jq '.env | keys' ${PWD}/helm/vars.yaml
        jq '.env | keys' ${PWD}/helm/secrets.yaml

        cp "${KUBECONFIG}" ".github-ci.kubeconfig"
        docker run -v "${PWD}:/data" -w /data ghcr.io/appuio/helm-v4:latest /bin/bash -c "cp .github-ci.kubeconfig /tmp/github-ci.kubeconfig; chmod 400 /tmp/github-ci.kubeconfig; /bin/helm dependency update /data/helm; HELM_DIFF_USE_UPGRADE_DRY_RUN=true /bin/helm diff upgrade '${CI_COMMIT_REF_SLUG}' /data/helm --namespace '${NAMESPACE}' --values "/data/helm/values.yaml" --values "/data/helm/env.yaml" --values /data/helm/vars.yaml --values /data/helm/secrets.yaml --kubeconfig /tmp/github-ci.kubeconfig --allow-unreleased"
    - env:
        IMAGE_DIGEST: "${{ steps.build.outputs.IMAGE_DIGEST || 'not built in this job' }}"
        NEWLINE: |2+

      name: k8ify deploy
      run: |
        jq -r 'try to_entries | map("\(.key)=\(.value|tostring|tojson)") | .[]' > .composeenv <<'EOF' ${{ env.NEWLINE }}${{ toJson(vars) }}${{ env.NEWLINE }}EOF
        jq -r 'try to_entries | map("\(.key)=\(.value|tostring|tojson)") | .[]' >> .composeenv <<'EOF' ${{ env.NEWLINE }}${{ toJson(secrets) }}${{ env.NEWLINE }}EOF
        docker run -v "${PWD}:/data" -w "/data" --env-file <(env) ghcr.io/vshn/k8ify:latest /bin/k8ify test ${CI_COMMIT_REF_SLUG} --shell-env-file /data/.composeenv --modified-image '${{ env.NAMESPACE }}/${{ env.CI_PROJECT_NAME }}:${{ env.CI_COMMIT_REF_SLUG }}'
        rm .composeenv
        kubectl apply -f "${PWD}/manifests/"
    - env:
        IMAGE_DIGEST: "${{ steps.build.outputs.IMAGE_DIGEST || 'not built in this job' }}"
        NEWLINE: |2+

      name: Helm Chart deploy
      run: |
        jq -n '.env=(env | with_entries(select(.key | startswith("KUBECONFIG_") | not)))' > ${PWD}/helm/env.yaml
        jq 'select(.!=null)|{vars:.,env:.}' > "${PWD}/helm/vars.yaml" <<'EOF' ${{ env.NEWLINE }}${{ toJson(vars) }}${{ env.NEWLINE }}EOF
        jq 'select(.!=null)|{secrets:.,env:.}' > "${PWD}/helm/secrets.yaml" <<'EOF' ${{ env.NEWLINE }}${{ toJson(secrets) }}${{ env.NEWLINE }}EOF
        cp "${KUBECONFIG}" ".github-ci.kubeconfig"
        docker run -v "${PWD}:/data" -w /data ghcr.io/appuio/helm-v4:latest /bin/bash -c "cp .github-ci.kubeconfig /tmp/github-ci.kubeconfig; chmod 400 /tmp/github-ci.kubeconfig; /bin/helm dependency update /data/helm; /bin/helm upgrade --install '${CI_COMMIT_REF_SLUG}' /data/helm --namespace '${NAMESPACE}' --values "/data/helm/values.yaml" --values "/data/helm/env.yaml" --values /data/helm/vars.yaml --values /data/helm/secrets.yaml --kubeconfig /tmp/github-ci.kubeconfig"
name: Build and deploy to test
"on":
  push:
    branches:
    - '**'
  workflow_dispatch: {}
